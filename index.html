<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentagram - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #111;
        }

        nav {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto;
            padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-size: 1.25rem; font-weight: 700; color: #111;
        }
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none; color: #555; font-size: 0.95rem;
        }
        .nav-links a.active { color: #4a90e2; font-weight: 500; }
        .nav-links a:hover { color: #111; }

        main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

        .section-header {
            text-align: center; margin-bottom: 2rem;
        }
        .section-header h1 {
            font-size: 1.9rem; font-weight: 700; margin-bottom: 0.5rem;
        }
        .section-header p {
            color: #666; font-size: 0.95rem;
        }

        .grid-home {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card-image-box {
            width: 100%; aspect-ratio: 1/1; overflow: hidden;
            background: #e8e8e8;
        }
        .card-image-box img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }

        .card-content {
            padding: 1rem 1.1rem 1.2rem;
        }
        .card-content h3 {
            font-size: 1rem; font-weight: 700; margin-bottom: 0.35rem;
        }
        .card-content p {
            font-size: 0.82rem; color: #666; line-height: 1.55;
        }

        @media (max-width: 700px) {
            .grid-home { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo">Tentagram</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="design.html">Design</a></li>
                <li><a href="product.html">Product</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section id="home">
            <div class="section-header">
                <h1>Selamat Datang</h1>
                <p>Perkenalkan kami dari team Tentagram.</p>
            </div>

            <div class="grid-home">

                <div class="card">
                    <div class="card-image-box">
                        <img src="alfaro.jpg" alt="alfaro">
                    </div>
                    <div class="card-content">
                        <h3>Muhammad Alfaro Ferdiansyah</h3>
                        <p>Content Writer</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image-box">
                        <img src="arya.jpg" alt="arya">
                    </div>
                    <div class="card-content">
                        <h3>Aryasatya Prayoga</h3>
                        <p>Apps Programmer</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image-box">
                        <img src="aufa.jpg" alt="aufa">
                    </div>
                    <div class="card-content">
                        <h3>Kaisan Aufa Ramadhan</h3>
                        <p>Graphic Designer</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image-box">
                        <img src="vierre.jpg" alt="vierre">
                    </div>
                    <div class="card-content">
                        <h3>Agma Xavierre Akbar</h3>
                        <p>Web Programmer.</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

</body>
</html>
